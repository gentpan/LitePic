# LitePic V3.0 — Nginx 示例配置
# 把以下 server 块按你的环境调整后启用（root 路径 / php-fpm 地址 / server_name）
#
# 关键点：
#   • 自定义 URL 前缀 (/img/、/photo/、/anyword/) 由 location 块直接重写到
#     image.php — 跟 .htaccess 里的 catch-all 等价
#   • /uploads/ 直连物理文件，最快，无 PHP
#   • /i/ 已经是 PHP 路由，不需要专门的 location
#   • 任何没匹配上的请求 fall back 到 index.php 走应用路由

server {
    listen 80;
    server_name your-domain.com;
    root /var/www/litepic;            # ← 改成你的实际路径
    index index.php;

    # 上传体积上限（按需调整，跟 settings → 上传限制 一致）
    client_max_body_size 50m;

    # ============================================================
    # 安全：禁止访问敏感文件 / 目录
    # ============================================================
    location ~ /\.(env|git) { deny all; return 403; }
    location ~ ^/data/      { deny all; return 403; }
    location ~ ^/logs/      { deny all; return 403; }

    # uploads/ 内禁止执行 PHP（即使被注入也不会跑）
    location ~ ^/uploads/.*\.php$ { deny all; return 403; }

    # ============================================================
    # 图片路由
    # ============================================================

    # /uploads/yyyy/mm/file.ext — 直连物理文件（最快，PHP 不参与，无 view_count）
    # 不需要专门规则，下面的 try_files 会处理（uploads/ 目录里有真实文件）。

    # /i/yyyy/mm/file.ext — 经 image.php（统计 + 防盗链）
    location ^~ /i/ {
        rewrite ^/i/(.+)$ /image.php?file=$1 last;
    }

    # /<custom-prefix>/yyyy/mm/file.ext — 用户在「设置 → 图片处理 → 图片链接前缀」
    # 自填的任意单词前缀（/img/、/photo/、/p/、/foo-bar/ 等），全部经 image.php
    # 走统计。等价于 .htaccess 里的 catch-all RewriteRule。
    #
    # 排除已知保留路径：uploads / i / api / static / assets / data / logs / settings /
    # gallery / upload / docs / stats —— 这些路径有自己的 handler。
    location ~* ^/(?!uploads/|i/|api/|static/|assets/|data/|logs/|settings/|gallery/|upload/|docs/|stats/)([a-z0-9][a-z0-9_-]*/)?([0-9]{4}/[0-9]{2}/[^/]+\.(jpg|jpeg|png|gif|webp|avif|svg|ico|bmp|tiff|tif|heic|jxl|raw|dng))$ {
        rewrite ^.*$ /image.php?file=$2 last;
    }

    # ============================================================
    # 应用路由 — 所有 /settings、/gallery、/api/v1/* 等都走单入口 index.php
    # ============================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;  # ← 改成你的 php-fpm socket / 地址
    }

    # ============================================================
    # 可选：纯 Nginx 防盗链（settings 里防盗链开关无效的话用这个）
    # ============================================================
    # location ^~ /uploads/ {
    #     valid_referers none blocked server_names *.your-domain.com;
    #     if ($invalid_referer) { return 403; }
    #     try_files $uri =404;
    # }
}
