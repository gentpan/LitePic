# LitePic V2.2 - Nginx 示例配置
# 将以下 server 块按你的环境调整后启用

server {
    listen 80;
    server_name localhost;
    root /Users/gentpan/projects/img.xifeng.net;
    index index.php;

    # 上传体积上限（按需调整）
    client_max_body_size 25m;

    # 禁止访问敏感文件和目录
    location ~ /\.env {
        deny all;
        return 403;
    }
    location ~ /\.git {
        deny all;
        return 403;
    }
    location ~ ^/data/ {
        deny all;
        return 403;
    }
    location ~ ^/logs/ {
        deny all;
        return 403;
    }

    # 禁止在 uploads 目录执行 PHP
    location ~ ^/uploads/.*\.php$ {
        deny all;
        return 403;
    }

    # 其余真实文件/目录（静态资源、uploads、api 等）
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 处理
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000; # 改成你的 php-fpm 地址
    }
}
