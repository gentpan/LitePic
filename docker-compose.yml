version: "3.8"

services:
  litepic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: litepic
    ports:
      - "8080:80"
    volumes:
      # 持久化上传文件
      - uploads_data:/var/www/html/uploads
      # 持久化运行时数据（包含 SQLite 数据库 — 现在所有设置和图片元数据都存在这里）
      - app_data:/var/www/html/data
      # 持久化日志
      - app_logs:/var/www/html/logs
      # .env 已不再是必需配置 — 所有设置都存到 SQLite 的 settings 表
      # 留此行只是为了首次安装时可以通过 .env 提供初始默认值（启动后会自动迁入 DB）
      # 如果不需要可以整行删除
      - ./.env:/var/www/html/.env
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    restart: unless-stopped

  # 异步图片处理 worker — 长驻进程，每 30s 唤醒一次 drain 队列。
  # 跟主 litepic 服务共享 uploads_data / app_data 卷，所以能看到同一个
  # SQLite 数据库和上传文件。比 host cron 更省心：
  #   • 不依赖宿主机 cron / systemd
  #   • 容器重启后自动恢复
  #   • 日志走 docker logs litepic-worker
  #   • flock 进程锁确保和上传请求中的 in-process drain 不冲突
  # 不想要这个 sidecar 也行 — 把整个 litepic-worker block 注释掉，回到
  # "每次上传后自动 drain" 兜底模式（适合纯个人 / 偶尔上传场景）。
  litepic-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: litepic-worker
    depends_on:
      - litepic
    volumes:
      - uploads_data:/var/www/html/uploads
      - app_data:/var/www/html/data
      - app_logs:/var/www/html/logs
      - ./.env:/var/www/html/.env
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    restart: unless-stopped
    # 覆盖默认的 apache CMD，跑一个 sleep + drain 死循环。
    # 单进程低开销，CPU 空闲时 drain 退出后会 sleep 30s。
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "[worker] starting drain loop (30s interval)";
        # 等几秒让主服务把 migrations 跑完、SQLite 文件就位
        sleep 5;
        while true; do
          php /var/www/html/worker.php --max-items=50 --max-seconds=25 2>&1 || true;
          sleep 30;
        done

volumes:
  uploads_data:
  app_data:
  app_logs:
