server {
    listen 8080;
    server_name litepic.local localhost;

    root /Users/gentpan/projects/LitePic;
    index index.php index.html;

    # 日志文件
    access_log /opt/homebrew/var/log/nginx/litepic.access.log;
    error_log /opt/homebrew/var/log/nginx/litepic.error.log;

    # 上传大小限制
    client_max_body_size 50m;

    # 安全：禁止访问敏感文件
    location ~ /\.(env|git|gitignore) {
        deny all;
        return 403;
    }

    location ~ ^/data/ {
        deny all;
        return 403;
    }

    location ~ ^/logs/ {
        deny all;
        return 403;
    }

    # 禁止在 uploads 目录执行 PHP
    location ~ ^/uploads/.*\.php$ {
        deny all;
        return 403;
    }

    # 主路由
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 处理
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_read_timeout 300;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
    }

    # 静态文件缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
